{{ define "main" }}
<article class="article-page">
    <header class="article-header">
        <div class="container">
            <div class="article-header-content">
                <div class="article-meta">
                    <span class="article-category">{{ .Params.category }}</span>
                    <span class="article-date">Posted on {{ .Date.Format "January 2, 2006" }}</span>
                </div>
                <h1 class="article-title">{{ .Title }}</h1>
                {{ if .Params.excerpt }}
                <p class="article-excerpt">{{ .Params.excerpt }}</p>
                {{ end }}
            </div>
        </div>
    </header>

    {{ if .Params.image }}
    <div class="article-featured-image">
        <div class="container">
            <img src="{{ .Params.image }}" alt="{{ .Title }}" />
        </div>
    </div>
    {{ end }}

    <div class="article-content-wrapper">
        <div class="container">
            <div class="article-content">
                {{ .Content }}
            </div>
            
            <div class="article-footer">
                <a href="/journal/" class="back-link">← Back to Journal</a>
            </div>
        </div>
    </div>
</article>
{{ end }}
